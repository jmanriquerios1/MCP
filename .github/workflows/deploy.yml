name: Node.js CI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: npm install

      - run: zip -r mcp.zip . -x 'node_modules/**' '.git/**'

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: mcp-learn-catalog-app-azevddenc4cmdzdp
          slot-name: production
          package: mcp.zip
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}

